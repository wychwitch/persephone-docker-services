<VirtualHost *:80>
	ServerSignature Off

	<IfModule mod_autoindex.c>
		Options -Indexes
	</IfModule>

	ServerName localhost 
	DocumentRoot "/var/www/html"

	WSGIDaemonProcess persephoneprocess threads=5 python-home=/var/www/html/environment python-path=/var/www/html
	WSGIScriptAlias / /var/www/html/persephone.wsgi

	<Directory /var/www/html>
		WSGIProcessGroup persephoneprocess
		WSGIApplicationGroup %{GLOBAL}
		Require all granted
	</Directory>

	AddType image/webp webp
</VirtualHost>
