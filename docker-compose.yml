name: persephone
services:
  frontend:
    build:
      context: ./frontend
    ports:
      - ${WEBSERVER_PORT}:80
#      - ${DEBUG_PORT}:5000
    volumes:
      - ./data/persephone.conf:/etc/apache2/sites-available/000-default.conf
      - ./data/persephone_installation:/var/www/html
      - apache2-data:/etc/apache2/
    networks:
      - persephone-network

  backend:
    image: mysql
    restart: always
    ports:
    - ${DB_PORT}:3306
    environment:
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./data/database:/var/lib/mysql
    networks:
      - persephone-network

  adminer:
    image: adminer
    restart: always
    ports:
      - ${ADMINER_PORT}:8080
    networks:
      - persephone-network

networks:
  persephone-network:
    driver: bridge
volumes:
  apache2-data:
